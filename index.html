<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vendora — a multi-vendor e-commerce marketplace. Shop thousands of products from verified merchants." />
    <meta name="theme-color" content="#0f172a" />
    <title>Vendora — Multi-Vendor Marketplace</title>
    <script>
      // Apply persisted theme before first paint to avoid a flash of the wrong mode
      try {
        var t = localStorage.getItem('vendora-theme')
        var dark = t ? JSON.parse(t)?.state?.theme === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches
        if (dark) document.documentElement.classList.add('dark')
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
